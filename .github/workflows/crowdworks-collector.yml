name: CrowdWorks 自動化

on:
  schedule:
    # 案件収集: 毎日 9:00, 13:00, 18:00 (JST)
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 9 * * *'
    # メッセージ巡回: 毎時 (9:00-22:00 JST = 0:00-13:00 UTC)
    - cron: '30 0-13 * * *'
  workflow_dispatch:
    inputs:
      command:
        description: '実行コマンド'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - collect
          - messages

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r tools/crowdworks/requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            tools/crowdworks/seen_jobs.json
            tools/crowdworks/seen_messages.json
          key: crowdworks-cache-${{ github.run_id }}
          restore-keys: crowdworks-cache-

      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "command=${{ inputs.command }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 0-13 * * *" ]; then
            echo "command=messages" >> $GITHUB_OUTPUT
          else
            echo "command=all" >> $GITHUB_OUTPUT
          fi

      - name: Run
        working-directory: tools/crowdworks
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CROWDWORKS_EMAIL: ${{ secrets.CROWDWORKS_EMAIL }}
          CROWDWORKS_PASSWORD: ${{ secrets.CROWDWORKS_PASSWORD }}
        run: python main.py ${{ steps.cmd.outputs.command }}

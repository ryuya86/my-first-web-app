name: CrowdWorks 案件収集

on:
  schedule:
    # 毎日 9:00, 13:00, 18:00 (JST) に実行 = UTC 0:00, 4:00, 9:00
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  collect-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r tools/crowdworks/requirements.txt

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: tools/crowdworks/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run collector
        working-directory: tools/crowdworks
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py
